<div id="cacheManagerContent" style="display: none;">
    <h2 class="fw-bold mb-4">Cache Manager</h2>
    <div class="card border-secondary shadow-sm mb-4" style="background-color: var(--bs-tertiary-bg); border-radius: 12px;">
        <div class="card-body p-3">
            <h6 class="card-subtitle mb-3 text-secondary fw-normal text-uppercase small" style="letter-spacing: 1px;">
                <i class="fa-solid fa-search me-2"></i>Search Server
            </h6>
            <div class="d-flex align-items-center bg-dark bg-opacity-50 rounded-pill px-3 py-2 border border-secondary border-opacity-25 mb-2">
                <i class="fa-solid fa-magnifying-glass text-secondary me-3"></i>
                <input type="text" id="serverSearchInput" class="form-control bg-transparent border-0 text-white p-0 shadow-none" placeholder="PASTE SERVER CODE AND PRESS ENTER..." style="letter-spacing: 1px; font-size: 13px;">
            </div>
            <small class="text-secondary" style="font-size: 11px;">
                Search server code <a href="https://servers.fivem.net" target="_blank" class="text-primary text-decoration-none">here</a>. 
                Example: detail/<span class="text-info fw-bold">k4y10g</span>
            </small>
            <div id="serverDetailResult" class="mt-4" style="display: none;"></div>
        </div>
    </div>
    <div id="localServerCard" class="mb-4" style="display: none;"></div>
    <div class="card border-secondary shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h6 class="card-subtitle text-secondary fw-normal text-uppercase small mb-0" style="letter-spacing: 1px;">
                    <i class="fa-solid fa-list-ul me-2"></i>CACHED SERVERS
                </h6>
                <button class="btn btn-link text-secondary p-0 shadow-none border-0" id="btnReloadLibrary" title="Reload Data" onclick="loadLibrary()">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div class="list-group list-group-flush" id="cachedList"></div>
        </div>
    </div>
</div>
<div id="cacheLockedPlaceholder" class="text-center py-5" style="display: none; margin-top: 10vh;">
    <div class="mb-4">
        <i class="fa-solid fa-lock text-secondary opacity-25" style="font-size: 100px;"></i>
    </div>
    <h4 class="text-white fw-bold">Cache Manager Locked</h4>
    <p class="text-secondary mx-auto" style="max-width: 400px;">
        Please configure your <b>FiveM Application Data</b> path in the <span class="text-primary">Path Config</span> menu first to unlock this feature.
    </p>
    <button class="btn btn-outline-primary rounded-pill px-4 mt-3" onclick="loadPage('path', $('.sidebar .nav-btn:first'))">
        Go to Path Config
    </button>
</div>

<script type="text/javascript">
    $(document).ready(function() {
        $('#serverSearchInput').on('keypress', function(e) { 
            if(e.which == 13) { 
                let code = $(this).val().trim();
                if(code.length >= 6) fetchServerData(code);
            }
        });
        loadLibrary(); 
    });

    function loadLibrary() {
        if(!window.pywebview || !window.pywebview.api) {
            setTimeout(loadLibrary, 100);
            return;
        }

        pywebview.api.get_path_conf().then(paths => {
            if(!paths.fivem_data || paths.fivem_data === "") {
                $('#cacheManagerContent').hide();
                $('#cacheLockedPlaceholder').fadeIn();
                return;
            }

            $('#cacheLockedPlaceholder').hide();
            $('#cacheManagerContent').show();
            syncLibraryData();
        });
    }

    function syncLibraryData() {
        $('#btnReloadLibrary i').addClass('fa-spin');
        $('#cachedList').html(`
            <div class="text-center p-5 text-secondary">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x mb-2"></i>
                <div class="small">Syncing Library...</div>
            </div>
        `).css('opacity', '0.7'); 

        pywebview.api.get_cached_library().then(response => {
            const local = response.local_server, servers = response.library;
            const isExe = response.exe_running, isRunning = response.fivem_running, activeCode = response.active_profile;

            if(isRunning) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'warning',
                    title: 'FiveM Detected Open',
                    text: 'Close the game to switch cache.',
                    showConfirmButton: false,
                    timer: 5000
                });
            }

            if(local.active) {
                const isLocalActive = (activeCode === 'localpriv');
                $('#localServerCard').html(`
                    <div class="card shadow-sm mb-4" style="background-color: var(--bs-tertiary-bg); border-radius: 12px; border-left: 5px solid ${isLocalActive ? '#2ecc71' : '#0078d4'} !important; border: 1px solid rgba(255,255,255,0.1);">
                        <div class="card-body p-3 d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center">
                                <div class="badge rounded-pill ${isLocalActive ? 'bg-success text-success' : 'bg-primary text-primary'} bg-opacity-25 border border-opacity-25 px-3 py-2 me-3">
                                    <i class="fa-solid fa-database"></i> ${local.size}
                                </div>
                                <div>
                                    <h6 class="fw-bold text-white mb-0">${local.name}</h6>
                                    <small class="${isLocalActive ? 'text-success' : 'text-primary'}" style="font-size: 11px;">
                                        <i class="fa-solid fa-code-branch me-1"></i> Build: ${local.gameBuild} | ${local.ip}
                                    </small>
                                </div>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <button class="btn btn-outline-danger border-0 px-3${isLocalActive ? ' d-none' : ''}" title="Reset Local Cache" onclick="confirmReset('localpriv')">
                                    <i class="fa-solid fa-rotate-left"></i>
                                </button>

                                ${isLocalActive ? `
                                    <div class="text-success px-3 fw-bold small">
                                        <i class="fa-solid fa-check-double me-1"></i> ACTIVE
                                    </div>
                                ` : `
                                    <button class="btn btn-primary btn-sm rounded-pill px-4 fw-bold" 
                                            onclick="handleConnect('localpriv', 'Local Server', '${isExe ? 'setup' : 'ip'}', true)">
                                        <i class="fa-solid ${isExe ? 'fa-right-left' : 'fa-plug'} me-1"></i> ${isExe ? 'SELECT' : 'CONNECT'}
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `).fadeIn(500);
            } else $('#localServerCard').hide();

            $('#cachedList').empty();
            if(servers.length === 0) {
                $('#cachedList').html('<div class="text-center p-4 text-secondary small">The library is empty.</div>');
            } else {
                servers.forEach(s => {
                    const isActive = (s.code === activeCode);
                    const themeColor = isActive ? '#2ecc71' : '#3498db';
                    const badgeClass = isActive ? "bg-success text-success" : "bg-primary text-primary";
                    const disableAttr = (isRunning && !isActive) ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : '';

                    $('#cachedList').append(`
                        <div class="card mb-2 bg-transparent border-secondary border-opacity-25" 
                            style="border-radius: 12px; border-left: 5px solid ${themeColor} !important; background-color: rgba(255,255,255,0.02) !important;">
                            <div class="card-body p-3 d-flex align-items-center justify-content-between">
                                <div class="d-flex align-items-center">
                                    <div class="badge rounded-pill bg-opacity-10 border border-opacity-25 px-3 py-2 me-3 ${badgeClass}">
                                        <i class="fa-solid fa-database me-1"></i> ${s.size}
                                    </div>
                                    <div>
                                        <div class="fw-bold ${isActive ? 'text-white' : 'text-white-50'}">${s.name}</div>
                                        <small class="text-muted" style="font-size: 10px;">Code: ${s.code}</small>
                                    </div>
                                </div>
                                <div class="d-flex gap-2 align-items-center">
                                    ${isExe ? `
                                        <button class="btn btn-outline-secondary border-0 px-2${isActive ? ' d-none' : ''}" ${disableAttr} onclick="confirmRemoveFromList('${s.code}', '${s.name}')">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                        <button class="btn btn-outline-danger border-0 px-2" ${disableAttr} onclick="confirmReset('${s.code}')">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                        ${isActive ? `
                                            <div class="text-success px-3 fw-bold small">
                                                <i class="fa-solid fa-check-double me-1"></i> ACTIVE
                                            </div>
                                        ` : `
                                            <button class="btn btn-primary btn-sm rounded-pill px-4 fw-bold" ${disableAttr} onclick="handleLibraryPlay('${s.code}', '${s.name}', 'switch')">
                                                <i class="fa-solid fa-right-left me-1"></i> SELECT
                                            </button>
                                        `}
                                    ` : `
                                        <button class="btn btn-outline-secondary border-0 px-2${isActive ? ' d-none' : ''}" ${disableAttr} onclick="confirmRemoveFromList('${s.code}', '${s.name}')">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                        <button class="btn btn-outline-danger border-0 px-2" ${disableAttr} onclick="confirmReset('${s.code}')">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                        <div class="btn-group">
                                            <button type="button" class="btn btn-sm btn-success rounded-pill px-4 fw-bold" data-bs-toggle="dropdown" ${disableAttr}>
                                                <i class="fa-solid fa-play me-1"></i> CONNECT
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary shadow">
                                                <li>
                                                    <a class="dropdown-item text-white py-2" href="#" onclick="handleLibraryPlay('${s.code}', '${s.name}', 'ip')">
                                                        <i class="fa-solid fa-network-wired me-2 small"></i> Connect IP
                                                    </a>
                                                </li>
                                                <li>
                                                    <a class="dropdown-item text-white py-2" href="#" onclick="handleLibraryPlay('${s.code}', '${s.name}', 'code')">
                                                        <i class="fa-solid fa-key me-2 small"></i> Connect Code
                                                    </a>
                                                </li>
                                            </ul>
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>
                    `);
                });
            }

            $('#btnReloadLibrary i').removeClass('fa-spin');
            $('#cachedList').css('opacity', '1');
        });
    }

    function fetchServerData(code) {
        $('#serverDetailResult').show().html(`
            <div class="text-center p-4 border border-secondary border-opacity-10 rounded-3">
                <i class="fa-solid fa-circle-notch fa-spin text-primary mb-2"></i>
                <div class="small text-secondary">Fetching Server Data...</div>
            </div>
        `);
        
        pywebview.api.fetch_server(code).then(res => {
            if(!res || res.error) {
                $('#serverDetailResult').html(`
                    <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <div class="small">Invalid Server Code or API Error.</div>
                    </div>
                `);
                return;
            }

            const html = `
                <div class="card border-secondary border-opacity-50 shadow-none" style="background-color: rgba(255,255,255,0.03); border-radius: 10px;">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center mb-3">
                            <img src="${res.icon}" class="rounded-2 me-3" style="width: 50px; height: 50px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1);">
                            <div class="flex-grow-1 overflow-hidden">
                                <h6 class="text-white fw-bold mb-0 text-truncate">${res.name}</h6>
                                <small class="text-secondary">${res.clients} / ${res.max} Players Online</small>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center pt-2 border-top border-secondary border-opacity-25">
                            <div class="small text-secondary">
                                <i class="fas fa-network-wired me-1 text-primary"></i> 
                                <span class="text-info">${res.ip}</span>
                            </div>
                            ${res.exe_running ? `
                                <button class="btn btn-primary rounded-pill px-4" onclick="handleConnect('${res.code}', '${res.name}', 'setup')">
                                    <i class="fa-solid fa-right-left me-2"></i> ADD SERVER
                                </button>
                            ` : `
                                <div class="btn-group">
                                    <button class="btn btn-primary rounded-pill-start px-4" onclick="handleConnect('${res.code}', '${res.name}', 'code')">
                                        <i class="fa-solid fa-paper-plane me-2"></i> CONNECT
                                    </button>
                                    <button type="button" class="btn btn-primary rounded-pill-end dropdown-toggle dropdown-toggle-split px-3" data-bs-toggle="dropdown">
                                        <span class="visually-hidden">Toggle Dropdown</span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-dark shadow">
                                        <li><a class="dropdown-item" href="#" onclick="handleConnect('${res.code}', '${res.name}', 'ip')">Connect via IP</a></li>
                                        <li><a class="dropdown-item" href="#" onclick="handleConnect('${res.code}', '${res.name}', 'code')">Connect via Code</a></li>
                                    </ul>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
            $('#serverDetailResult').html(html);
        });
    }

    function confirmReset(code) {
        Swal.fire({
            title: 'Clear Cache?',
            text: "The application will freeze momentarily during the uninstall process.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Yes, Delete!',
            background: '#1a1a1a',
            color: '#ffffff'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Deleting...',
                    text: 'Please wait, do not close the application.',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                pywebview.api.reset_cache(code).then(res => {
                    if (res.status === "success") {
                        Swal.fire({ icon: 'success', title: 'Success', text: res.message, background: '#1a1a1a', color: '#fff' });
                        loadLibrary();
                    } else {
                        Swal.fire({ icon: 'error', title: 'Failed', text: res.message, background: '#1a1a1a', color: '#fff' });
                    }
                });
            }
        });
    }

    function confirmRemoveFromList(code, name) {
        Swal.fire({
            title: 'Remove from List?',
            text: `Server "${name}" will be removed from the library and its cache files will also be removed from storage.`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Yes, Delete List',
            cancelButtonText: 'Cancel',
            background: '#1a1a1a',
            color: '#ffffff'
        }).then((result) => {
            if (result.isConfirmed) {
                pywebview.api.remove_from_list(code).then(res => {
                    if(res.status === "success") {
                        loadLibrary();
                    }
                });
            }
        });
    }

    function handleLibraryPlay(code, name, mode = 'code') {
        Swal.fire({
            title: 'Processing...',
            text: (mode === 'setup') ? `Preparing cache for ${name}...` : `Connecting to ${name}...`,
            allowOutsideClick: false,
            background: '#1a1a1a',
            color: '#ffffff',
            didOpen: () => { Swal.showLoading(); }
        });

        pywebview.api.connect_server(code, mode, false).then(res => {
            if(res.status === 'success') {
                createSwal(true, 'Success!', res.message);
                loadLibrary();
            } else createSwal(false, 'Failed!', res.message);
        });
    }

    function handleConnect(code, name, mode = 'code') {
        Swal.fire({
            title: 'Processing...',
            text: (mode === 'setup') ? `Preparing cache for ${name}...` : `Connecting to ${name}...`,
            allowOutsideClick: false,
            background: '#1a1a1a',
            color: '#ffffff',
            didOpen: () => { Swal.showLoading(); }
        });

        pywebview.api.connect_server(code, mode, true).then(res => {
            if(res.status === 'success') {
                createSwal(true, 'Success!', res.message);
                
                loadLibrary();
                if(mode === 'setup') {
                    $('#serverDetailResult').fadeOut();
                    $('#serverSearchInput').val('');
                }
            } else createSwal(false, 'Failed!', res.message);
        }).catch(err => {
            console.error("Connection Error:", err);
            Swal.fire({ icon: 'error', title: 'Bridge Error', text: 'An error occurred in the Python bridge system.', background: '#1a1a1a', color: '#ffffff' });
        });
    }

    function createSwal(type, title, message) {
        if(type) {
            Swal.fire({
                icon: 'success',
                title: title,
                text: message,
                timer: 5000,
                showConfirmButton: false,
                background: '#1a1a1a',
                color: '#ffffff'
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: title,
                text: message,
                confirmButtonColor: '#0078D4',
                background: '#1a1a1a',
                color: '#ffffff'
            });
        }
    }
</script>
