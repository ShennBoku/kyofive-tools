<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: transparent !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container Utama dengan Efek Glassmorphism */
        .glass-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 85%;
            height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            -webkit-app-region: drag; /* Area seret */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Lingkaran Indikator */
        .indicator-ring {
            position: relative;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        /* Status: Inactive (Red) */
        .status-off .dot {
            background-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }
        .status-off .indicator-ring { border-color: rgba(255, 71, 87, 0.2); }

        /* Status: Running (Green) */
        .status-on .dot {
            background-color: #2ed573;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.8);
            animation: pulse 1.5s infinite;
        }
        .status-on .indicator-ring { border-color: rgba(46, 213, 115, 0.4); }

        /* Teks Status */
        .label {
            font-size: 9px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
        }

        .value {
            font-size: 11px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="mainCard" class="glass-card status-off">
        <div class="label">Clicker</div>
        <div class="indicator-ring">
            <div class="dot"></div>
        </div>
        <div id="statusText" class="value">Standby</div>
    </div>

    <script>
        function updateStatus(isSpamming) {
            const card = document.getElementById('mainCard');
            const txt = document.getElementById('statusText');
            
            if (isSpamming) {
                card.className = 'glass-card status-on';
                txt.innerText = 'Running';
            } else {
                card.className = 'glass-card status-off';
                txt.innerText = 'Standby';
            }
        }
    </script>
</body>
</html>
